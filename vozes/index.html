<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>as vozes no meio do redemunho - redemunhos</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
        <link rel="apple-touch-icon" sizes="180x180" href="../img/favicon/apple-touch-icon.png" />
        <link rel="icon" type="image/png" sizes="32x32" href="../img/favicon/favicon-32x32.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="../img/favicon/favicon-16x16.png" />
        <link rel="manifest" href="../img/favicon/site.webmanifest" />
        <link rel="stylesheet" href="../style.css" />
    </head>
    <body class="vozes-interactive">
        <a href="/" class="back-arrow"><img src="../img/back.png" alt="Back" /></a>

        <main class="vozes-stage">
            <div class="vozes-image-wrap" id="vozes-image-wrap">
                <img
                    src="../img/mapa.png"
                    alt="As vozes no meio do redemunho"
                    class="vozes-image"
                    id="vozes-image"
                />

                <div class="vozes-darken" id="vozes-darken"></div>
                <div class="vozes-hotspots" id="vozes-hotspots"></div>
            </div>

            <div class="player-host" id="player-host"></div>

            <section class="vozes-end">
                <h2 class="vozes-end-title">as vozes no meio do redemunho</h2>
                <p class="vozes-end-sub">um percurso guiado pela obra</p>

                <div class="vozes-video-frame">
                    <video
                        class="vozes-video"
                        id="vozes-video"
                        controls
                        preload="metadata"
                    >
                        <source src="https://samplelib.com/lib/preview/mp4/sample-5s.mp4" type="video/mp4" />
                        Seu navegador não suporta vídeo HTML5.
                    </video>
                </div>

                <p class="vozes-end-caption">
                    Clique nas figuras para ouvir suas vozes. Cada elipse guarda uma fala do redemunho.
                </p>
            </section>
        </main>

        <script src="./script.js"></script>
    </body>
</html>
